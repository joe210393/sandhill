<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>兌換核銷台 | 沙丘</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" type="image/png" href="/images/mascot.png" />
  <style>
    .redeem-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
    }

    .scan-section {
      background: white;
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      margin-bottom: 24px;
    }

    .scan-icon {
      font-size: 4em;
      margin-bottom: 16px;
      opacity: 0.7;
    }

    .scan-title {
      font-size: 1.5em;
      font-weight: bold;
      margin-bottom: 12px;
      color: #2d3748;
    }

    .scan-description {
      color: #666;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .manual-input {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #eee;
    }

    .manual-input h4 {
      color: #2d3748;
      margin-bottom: 12px;
    }

    .manual-form {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .manual-form input {
      flex: 1;
      padding: 10px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 16px;
    }

    .manual-form input:focus {
      outline: none;
      border-color: #007bff;
    }

    .btn-primary, .btn-secondary {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
    }

    .btn-primary {
      background: #007bff;
      color: white;
    }

    .btn-primary:hover {
      background: #0056b3;
    }

    .btn-secondary {
      background: #6c757d;
      color: white;
    }

    .btn-secondary:hover {
      background: #5a6268;
    }

    .coupon-details {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      margin-bottom: 24px;
      display: none;
    }

    .coupon-details.show {
      display: block;
    }

    .coupon-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    .info-item {
      background: #f8f9fa;
      padding: 12px 16px;
      border-radius: 8px;
    }

    .info-label {
      font-size: 0.9em;
      color: #666;
      margin-bottom: 4px;
    }

    .info-value {
      font-weight: 600;
      color: #2d3748;
    }

    .redeem-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      padding-top: 20px;
      border-top: 1px solid #eee;
    }

    .redeem-actions button {
      min-width: 120px;
    }

    .result-message {
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }

    .result-message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .result-message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .history-section {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .history-title {
      font-size: 1.3em;
      font-weight: bold;
      margin-bottom: 16px;
      color: #2d3748;
    }

    .history-list {
      max-height: 300px;
      overflow-y: auto;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .history-item:last-child {
      border-bottom: none;
    }

    .history-info h5 {
      margin: 0 0 4px 0;
      color: #2d3748;
    }

    .history-meta {
      font-size: 0.9em;
      color: #666;
    }

    .history-time {
      font-size: 0.9em;
      color: #666;
    }

    @media (max-width: 768px) {
      .redeem-container {
        padding: 16px;
      }

      .coupon-info {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .redeem-actions {
        flex-direction: column;
      }

      .manual-form {
        flex-direction: column;
      }

      .manual-form input {
        margin-bottom: 8px;
      }
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <div id="navHome"><a href="/index.html">首頁</a></div>
      <div id="navEntries"><a href="/index.html#gameEntries">玩法入口</a></div>
      <div id="navLab"><a href="/ai-lab.html">海底探索艙</a></div>
      <div id="navDashboard"><a href="/user-dashboard.html">玩家中心</a></div>
      <div id="navRedeem"><a href="/products.html">兌換商品</a></div>
      <div id="navUserTasks"><a href="/user-tasks.html">遊戲紀錄</a></div>
      <div id="loginUserInfo">載入中...</div>
      <button id="logoutBtn" style="display:none;">登出</button>
    </nav>
  </header>

  <main>
    <div class="redeem-container">
      <h1>兌換核銷台</h1>

      <!-- 結果訊息 -->
      <div id="resultMessage" class="result-message"></div>

      <!-- 掃描區域 -->
      <div class="scan-section">
        <div class="scan-icon">📱</div>
        <h3 class="scan-title">掃描優惠券QR碼</h3>
        <p class="scan-description">
          請讓用戶出示他們的優惠券QR碼，或手動輸入優惠券代碼進行核銷。
        </p>

        <!-- 手動輸入區域 -->
        <div class="manual-input">
          <h4>手動輸入優惠券代碼</h4>
          <div class="manual-form">
            <input type="text" id="couponCode" placeholder="輸入優惠券代碼" />
            <button onclick="lookupCoupon()" class="btn-primary">查詢</button>
          </div>
        </div>
      </div>

      <!-- 優惠券詳情 -->
      <div id="couponDetails" class="coupon-details">
        <h3>優惠券詳情</h3>
        <div id="couponInfo" class="coupon-info">
          <!-- 優惠券信息將動態載入 -->
        </div>
        <div class="redeem-actions">
          <button onclick="confirmRedeem()" class="btn-primary" id="redeemBtn">確認核銷</button>
          <button onclick="cancelRedeem()" class="btn-secondary">取消</button>
        </div>
      </div>

      <!-- 核銷歷史 -->
      <div class="history-section">
        <h3 class="history-title">今日核銷記錄</h3>
        <div id="historyList" class="history-list">
          <!-- 核銷歷史將動態載入 -->
        </div>
      </div>
    </div>
  </main>

  <footer>
    &copy; 2026 沙丘 AI 實境遊戲平台
  </footer>

  <script>
    const API_BASE = '';
    let currentCoupon = null;

    // 查詢優惠券
    async function lookupCoupon() {
      const couponCode = document.getElementById('couponCode').value.trim();
      if (!couponCode) {
        showMessage('請輸入優惠券代碼', 'error');
        return;
      }

      try {
        const response = await fetch(`${API_BASE}/api/coupons/lookup/${couponCode}`, {
          credentials: 'include'
        });

        const data = await response.json();

        if (data.success) {
          displayCouponDetails(data.coupon);
        } else {
          showMessage(data.message || '查詢優惠券失敗', 'error');
          hideCouponDetails();
        }
      } catch (error) {
        console.error('查詢優惠券錯誤:', error);
        showMessage('查詢優惠券失敗', 'error');
      }
    }

    // 顯示優惠券詳情
    function displayCouponDetails(coupon) {
      currentCoupon = coupon;

      const expiryDate = new Date(coupon.expiry_date);
      const isExpired = expiryDate < new Date();
      const isUsed = coupon.is_used;

      let statusText = '有效';
      let statusColor = '#28a745';

      if (isUsed) {
        statusText = '已使用';
        statusColor = '#6c757d';
      } else if (isExpired) {
        statusText = '已過期';
        statusColor = '#dc3545';
      }

      document.getElementById('couponInfo').innerHTML = `
        <div class="info-item">
          <div class="info-label">優惠券代碼</div>
          <div class="info-value">${coupon.coupon_code}</div>
        </div>
        <div class="info-item">
          <div class="info-label">優惠券名稱</div>
          <div class="info-value">${coupon.title}</div>
        </div>
        <div class="info-item">
          <div class="info-label">用戶名稱</div>
          <div class="info-value">${coupon.username || '未知用戶'}</div>
        </div>
        <div class="info-item">
          <div class="info-label">狀態</div>
          <div class="info-value" style="color: ${statusColor}">${statusText}</div>
        </div>
        <div class="info-item">
          <div class="info-label">折扣金額</div>
          <div class="info-value">
            ${coupon.discount_amount ? `${coupon.discount_amount}元` : ''}
            ${coupon.discount_percent ? `${coupon.discount_percent}% OFF` : ''}
          </div>
        </div>
        <div class="info-item">
          <div class="info-label">到期日期</div>
          <div class="info-value">${expiryDate.toLocaleDateString('zh-TW')}</div>
        </div>
      `;

      document.getElementById('couponDetails').classList.add('show');

      // 根據狀態控制核銷按鈕
      const redeemBtn = document.getElementById('redeemBtn');
      if (isUsed || isExpired) {
        redeemBtn.disabled = true;
        redeemBtn.textContent = isUsed ? '已使用' : '已過期';
      } else {
        redeemBtn.disabled = false;
        redeemBtn.textContent = '確認核銷';
      }
    }

    // 隱藏優惠券詳情
    function hideCouponDetails() {
      document.getElementById('couponDetails').classList.remove('show');
      currentCoupon = null;
    }

    // 確認核銷
    async function confirmRedeem() {
      if (!currentCoupon) return;

      if (!confirm(`確定要核銷優惠券「${currentCoupon.title}」嗎？\n\n核銷後此優惠券將失效且無法恢復。`)) {
        return;
      }

      try {
        const response = await fetch(`${API_BASE}/api/coupons/${currentCoupon.id}/redeem`, {
          method: 'POST',
          credentials: 'include'
        });

        const data = await response.json();

        if (data.success) {
          showMessage('優惠券核銷成功！', 'success');
          hideCouponDetails();
          document.getElementById('couponCode').value = '';
          loadRedeemHistory();
        } else {
          showMessage(data.message || '核銷失敗', 'error');
        }
      } catch (error) {
        console.error('核銷優惠券錯誤:', error);
        showMessage('核銷失敗', 'error');
      }
    }

    // 取消核銷
    function cancelRedeem() {
      hideCouponDetails();
    }

    // 載入核銷歷史
    async function loadRedeemHistory() {
      try {
        const response = await fetch(`${API_BASE}/api/coupons/redeem-history`, {
          credentials: 'include'
        });

        const data = await response.json();

        if (data.success) {
          displayRedeemHistory(data.history);
        }
      } catch (error) {
        console.error('載入核銷歷史錯誤:', error);
      }
    }

    // 顯示核銷歷史
    function displayRedeemHistory(history) {
      const historyList = document.getElementById('historyList');

      if (history.length === 0) {
        historyList.innerHTML = '<p style="text-align: center; color: #666; padding: 20px;">今日還沒有核銷記錄</p>';
        return;
      }

      historyList.innerHTML = history.map(item => `
        <div class="history-item">
          <div class="history-info">
            <h5>${item.coupon_title}</h5>
            <div class="history-meta">
              代碼：${item.coupon_code} | 玩家：${item.username}
            </div>
          </div>
          <div class="history-time">
            ${new Date(item.used_at).toLocaleTimeString('zh-TW', {
              hour: '2-digit',
              minute: '2-digit'
            })}
          </div>
        </div>
      `).join('');
    }

    // 顯示訊息
    function showMessage(message, type) {
      const messageDiv = document.getElementById('resultMessage');
      messageDiv.textContent = message;
      messageDiv.className = `result-message ${type}`;
      messageDiv.style.display = 'block';

      setTimeout(() => {
        messageDiv.style.display = 'none';
      }, 5000);
    }

    // 按 Enter 鍵查詢優惠券
    document.getElementById('couponCode').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        lookupCoupon();
      }
    });

    // 初始化頁面
    document.addEventListener('DOMContentLoaded', function() {
      // 載入用戶資訊
      const loginUser = JSON.parse(localStorage.getItem('loginUser') || 'null');
      if (!loginUser) {
        window.location.href = '/login.html';
        return;
      }

      // 檢查權限
      if (loginUser.role !== 'shop' && loginUser.role !== 'admin') {
        alert('只有商店和管理员可以訪問此頁面');
        window.location.href = '/';
        return;
      }

      // 顯示用戶資訊
      document.getElementById('loginUserInfo').textContent = `兌換工作人員：${loginUser.username}`;
      document.getElementById('logoutBtn').style.display = '';

      // 設置登出功能
      document.getElementById('logoutBtn').onclick = async function() {
        try {
          await fetch(`${API_BASE}/api/logout`, {
            method: 'POST',
            credentials: 'include'
          });
        } catch (error) {
          console.error('登出錯誤:', error);
        }
        localStorage.removeItem('loginUser');
        window.location.href = '/login.html';
      };

      // 載入核銷歷史
      loadRedeemHistory();
    });
  </script>
</body>
</html>
