<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>註冊 | 沙丘</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" type="image/png" href="/images/mascot.png" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    .mobile-auth-shell {
      min-height: 100vh;
      padding-bottom: calc(28px + env(safe-area-inset-bottom, 0px));
    }
    .mobile-auth-shell main {
      display: flex;
      align-items: center;
    }
    .mobile-auth-hero {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
      text-align: center;
    }
    .mobile-auth-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(245,158,11,0.12);
      color: #b45309;
      font-weight: 700;
      font-size: 0.9rem;
    }
    @media (max-width: 768px) {
      .mobile-auth-shell main {
        display: block;
      }
      .mobile-auth-shell .form-container {
        margin-top: 10px;
      }
    }
  </style>
</head>
<body class="mobile-auth-shell">
  <header id="mainHeader">
    <div class="header-content" id="headerContent">
      <h1 id="pageTitle">加入沙丘</h1>
      <button id="hamburgerBtn" class="hamburger" aria-label="展開選單">&#9776;</button>
      <nav class="main-nav">
        <a href="/index.html">首頁</a>
        <a href="/index.html#gameEntries">玩法入口</a>
        <a href="/ai-lab.html" id="navTasksList">開啟遊戲殼</a>
        <a href="/user-tasks.html">遊戲紀錄</a>
        <a href="/staff-dashboard.html" id="navStaff" style="display:none;">管理控制台</a>
        <a href="/user-dashboard.html" id="navUserTasks" style="display:none;">玩家管理</a>
        <a href="/products.html" id="navProducts">商品兌換</a>
        <span id="loginUserInfo" style="display:none; color:var(--text-secondary); padding:0.5rem 1rem;"></span>
        <button id="logoutBtn" style="display:none;">登出</button>
      </nav>
    </div>
  </header>

  <main>
    <div class="form-container">
      <div class="mobile-auth-hero">
        <span class="mobile-auth-badge">30 秒建立玩家身份</span>
        <h2 class="text-center mb-4" style="color:var(--text-primary);">成為新的玩家</h2>
        <p class="text-center mb-4" style="color:var(--text-secondary); line-height:1.7;">
          註冊後就能選擇劇情主線或大富翁玩法，直接從海底探索艙開始遊戲。
        </p>
      </div>
      
      <form id="registerForm">
        <div class="form-group">
          <label class="form-label">玩家手機門號</label>
          <input class="form-input" type="text" name="username" required pattern="[0-9]{10}" maxlength="10" placeholder="請輸入10碼手機號碼" />
          <small style="color: var(--text-secondary); display: block; margin-top: 5px;">我們會用這組門號當作你的玩家登入帳號</small>
        </div>
        <button type="submit" class="btn btn-success w-100">加入沙丘</button>
        <div id="registerMsg" class="mt-2 text-center" style="min-height: 24px;"></div>
      </form>

      <div class="text-center mt-4" style="border-top: 1px solid #eee; padding-top: 1rem;">
        <span style="color: var(--text-secondary);">已經有帳號？</span>
        <a href="/login.html" style="color: var(--primary-color); text-decoration: none; font-weight: 500;">立即登入</a>
      </div>
    </div>
  </main>

  <footer>
    &copy; 2026 沙丘 AI 實境遊戲平台
  </footer>
  <script src="/js/register.js"></script>
  <script>
    // Header 功能（命名與權限顯示會統一走沙丘語境）
    const loginUser = JSON.parse(localStorage.getItem('loginUser') || 'null');

    if (loginUser) {
        const userInfoSpan = document.getElementById('loginUserInfo');
        userInfoSpan.style.display = 'inline-block';
        userInfoSpan.textContent = getUserDisplayName(loginUser);
        
        const logoutBtn = document.getElementById('logoutBtn');
        logoutBtn.style.display = 'inline-block';
        logoutBtn.onclick = function() {
            localStorage.removeItem('loginUser');
            window.location.href = '/login.html';
        };

        // 根據權限顯示導航鏈接
        if (loginUser.role === 'admin') {
            document.getElementById('navStaff').style.display = '';
        } else if (loginUser.role === 'shop') {
            document.getElementById('navStaff').style.display = '';
        }
        if (loginUser.role === 'user') {
            document.getElementById('navUserTasks').style.display = '';
        }
        
        // 隱藏任務列表對工作人員
        if (loginUser.role === 'shop' || loginUser.role === 'admin') {
            const navTasksList = document.getElementById('navTasksList');
            if (navTasksList) navTasksList.style.display = 'none';
        }
    }

    function getUserDisplayName(loginUser) {
        switch(loginUser.role) {
            case 'admin': return `沙丘管理員：${loginUser.username}`;
            case 'shop': return `工作人員：${loginUser.username}`;
            case 'user': return `玩家：${loginUser.username}`;
            default: return loginUser.username;
        }
    }

    document.getElementById('hamburgerBtn').onclick = function() {
        document.getElementById('headerContent').classList.toggle('open');
    };
    
    document.querySelectorAll('.main-nav a').forEach(a => {
        a.onclick = () => document.getElementById('headerContent').classList.remove('open');
    });
  </script>
  <script src="/js/nav-access.js"></script>
</body>
</html>
