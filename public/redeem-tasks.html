<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>兌換內容控制台 | 沙丘</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" type="image/png" href="/images/mascot.png" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    /* 現代化設計變數 */
    :root {
      --primary-color: #6366f1;
      --secondary-color: #8b5cf6;
      --accent-color: #f59e0b;
      --success-color: #10b981;
      --glass-bg: rgba(255, 255, 255, 0.15);
      --glass-border: rgba(255, 255, 255, 0.18);
      --shadow-light: 0 8px 32px rgba(31, 38, 135, 0.37);
      --shadow-dark: 0 4px 16px rgba(0, 0, 0, 0.1);
      --gradient-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --gradient-secondary: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      --gradient-accent: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
    }

    /* 全局樣式 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      line-height: 1.6;
      color: #1f2937;
      /* 使用首頁的背景風格，但可能需要調整以免影響閱讀 */
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Header 樣式 - 玻璃擬態 */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--glass-border);
      box-shadow: var(--shadow-light);
      transition: all 0.3s ease;
    }

    .header-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .header-content h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0;
    }

    .main-nav {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: nowrap;
      overflow: hidden;
    }

    .main-nav a {
      color: #374151;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.875rem;
      padding: 0.4rem 0.8rem;
      border-radius: 0.5rem;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      white-space: nowrap;
    }

    .main-nav a::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: var(--gradient-accent);
      transition: left 0.3s ease;
      z-index: -1;
    }

    .main-nav a:hover::before,
    .main-nav a.current-page::before {
      left: 0;
    }

    .main-nav a:hover,
    .main-nav a.current-page {
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(79, 172, 254, 0.3);
    }

    .main-nav span {
      color: #6b7280;
      font-size: 0.875rem;
      padding: 0.5rem 1rem;
      background: rgba(255, 255, 255, 0.5);
      border-radius: 0.75rem;
      backdrop-filter: blur(10px);
    }

    .main-nav button {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
      border: none;
      border-radius: 0.75rem;
      padding: 0.5rem 1.5rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
    }

    .main-nav button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(239, 68, 68, 0.4);
    }

    .hamburger {
      display: none;
      background: none;
      border: none;
      font-size: 1.5rem;
      color: #374151;
      cursor: pointer;
      padding: 0.5rem;
      border-radius: 0.5rem;
      transition: all 0.3s ease;
      position: absolute;
      right: 1rem;
      top: 0.75rem;
      z-index: 1100;
    }

    .hamburger:hover {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
    }

    /* 主內容區域調整 */
    main {
      margin-top: 120px;
      padding: 2rem 1rem;
      min-height: calc(100vh - 160px);
    }

    /* 響應式設計 */
    @media (max-width: 768px) {
      .header-content {
        padding: 1rem;
        position: relative;
      }

      .header-content h1 {
        font-size: 1.25rem;
        margin-bottom: 0;
        width: auto;
        text-align: left;
        flex-grow: 1;
      }

      .main-nav {
        display: none;
        position: fixed;
        top: 60px;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(20px);
        flex-direction: column;
        padding: 2rem 1rem;
        gap: 1rem;
        overflow-y: auto;
        z-index: 999;
        border-top: 1px solid var(--glass-border);
      }

      .header-content.open .main-nav {
        display: flex;
      }

      .main-nav a, .main-nav button, .main-nav span {
        width: 100%;
        text-align: center;
        padding: 1rem;
        font-size: 1.1rem;
        background: rgba(255, 255, 255, 0.5);
        border-radius: 12px;
      }

      .main-nav a.current-page {
        background: var(--primary-color);
        color: white !important;
      }

      .hamburger {
        display: block;
      }
    }

    /* 標籤頁面樣式 */
    .tab-container {
      max-width: 1000px;
      margin: 30px auto;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .tab-buttons {
      display: flex;
      background: #f8f9fa;
      border-bottom: 1px solid #dee2e6;
    }
    .tab-btn {
      flex: 1;
      padding: 15px 20px;
      border: none;
      background: none;
      font-size: 1em;
      font-weight: 500;
      color: #666;
      cursor: pointer;
      transition: all 0.3s ease;
      border-bottom: 2px solid transparent;
    }
    .tab-btn:hover {
      background: #e9ecef;
      color: #333;
    }
    .tab-btn.active {
      background: #fff;
      color: #007bff;
      border-bottom-color: #007bff;
    }
    .tab-content {
      padding: 30px;
    }
    .tab-pane {
      display: none;
    }
    .tab-pane.active {
      display: block;
    }


    /* 兌換內容控制台樣式 */
    .products-section {
      margin-bottom: 30px;
    }
    .products-section h3 {
      color: #333;
      margin-bottom: 20px;
      font-size: 1.4em;
    }
    .add-product-btn {
      background: #28a745;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 10px 20px;
      font-size: 1em;
      cursor: pointer;
      margin-bottom: 20px;
    }
    .add-product-btn:hover {
      background: #218838;
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
    }
    .product-card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      padding: 20px;
      border: 1px solid #e9ecef;
    }
    .product-name {
      font-size: 1.2em;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }
    .product-points {
      color: #007bff;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .product-stock {
      color: #666;
      margin-bottom: 15px;
    }
    .product-actions {
      display: flex;
      gap: 8px;
    }
    .edit-btn {
      background: #ffc107;
      color: #212529;
      border: none;
      border-radius: 4px;
      padding: 6px 12px;
      cursor: pointer;
    }
    .edit-btn:hover {
      background: #e0a800;
    }
    .delete-btn {
      background: #dc3545;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 6px 12px;
      cursor: pointer;
    }
    .delete-btn:hover {
      background: #c82333;
    }

    /* 模態框樣式 */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
    }
    .modal-content {
      background: #fff;
      border-radius: 8px;
      padding: 30px;
      width: 90%;
      max-width: 500px;
      margin: 100px auto;
      position: relative;
    }
    .close-btn {
      position: absolute;
      top: 15px;
      right: 15px;
      font-size: 1.5em;
      cursor: pointer;
      color: #666;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: 600;
      color: #333;
    }
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 1em;
    }
    .form-group textarea {
      height: 80px;
      resize: vertical;
    }
    .form-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    .save-btn {
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 10px 20px;
      cursor: pointer;
    }
    .save-btn:hover {
      background: #0056b3;
    }
    .cancel-btn {
      background: #6c757d;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 10px 20px;
      cursor: pointer;
    }
    .cancel-btn:hover {
      background: #545b62;
    }

    /* 兌換記錄樣式 */
    .redemption-filters {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
      align-items: center;
    }
    .redemption-filters select, .redemption-filters input {
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 1em;
    }
    .redemption-filters input {
      flex: 1;
      max-width: 300px;
    }
    .redemptions-grid {
      display: grid;
      gap: 15px;
    }
    .redemption-card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      padding: 20px;
      border: 1px solid #e9ecef;
    }
    .redemption-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    .redemption-product {
      font-size: 1.2em;
      font-weight: 600;
      color: #333;
    }
    .redemption-user {
      color: #007bff;
      font-size: 1em;
      font-weight: 600;
      margin-bottom: 10px;
      background: #f8f9fa;
      padding: 6px 12px;
      border-radius: 6px;
      border-left: 3px solid #007bff;
      display: inline-block;
    }
    .redemption-status {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 0.8em;
      font-weight: 600;
      text-transform: uppercase;
    }
    .redemption-status.pending {
      background: #fff3cd;
      color: #856404;
    }
    .redemption-status.completed {
      background: #d4edda;
      color: #155724;
    }
    .redemption-status.cancelled {
      background: #f8d7da;
      color: #721c24;
    }
    .redemption-meta {
      display: flex;
      gap: 20px;
      font-size: 0.9em;
      color: #666;
      margin-bottom: 15px;
    }
    .redemption-points {
      color: #007bff;
      font-weight: 600;
    }
    .redemption-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    .process-btn {
      background: #28a745;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 0.9em;
    }
    .process-btn:hover {
      background: #218838;
    }
    .cancel-btn {
      background: #dc3545;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 0.9em;
    }
    .cancel-btn:hover {
      background: #c82333;
    }

    @media (max-width: 600px) {
      .tab-content { padding: 20px; }
      .product-grid { grid-template-columns: 1fr; }
      .redemption-filters {
        flex-direction: column;
        align-items: stretch;
      }
      .redemption-filters input {
        max-width: none;
      }
      .redemption-header {
        flex-direction: column;
        gap: 10px;
        align-items: flex-start;
      }
    }
    
    /* Footer */
    footer {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-top: 1px solid var(--glass-border);
      padding: 2rem 1rem;
      text-align: center;
      color: #6b7280;
      margin-top: 4rem;
    }
  </style>
</head>
<body>
  <header id="mainHeader">
    <div class="header-content" id="headerContent">
      <h1 id="pageTitle">兌換內容控制台</h1>
      <button id="hamburgerBtn" class="hamburger" aria-label="展開選單">&#9776;</button>
      <nav class="main-nav">
        <a href="/index.html">首頁</a>
        <a href="/index.html#gameEntries">玩法入口</a>
        <a href="/ai-lab.html">海底探索艙</a>
        <a href="/tasks-list.html" id="navTasksList">關卡列表</a>
        <a href="/products.html" id="navProducts">商品兌換</a>
        <a href="/user-tasks.html">玩家挑戰紀錄</a>
        <a href="/staff-dashboard.html" id="navStaff" style="display:none;">內容控制台</a>
        <a href="/role-management.html" id="navRoleMgmt" style="display:none;">權限管理</a>
        <a href="/user-dashboard.html" id="navUserTasks" style="display:none;">玩家內容管理</a>
        <a href="/redeem-tasks.html" id="navRedeem" class="current-page">兌換內容控制台</a>
        <a href="/admin-users.html" id="navAdminUsers" style="display:none;">會員管理</a>
        <span id="loginUserInfo" style="display:none;color:#6b7280;text-decoration:none;cursor:default;"></span>
        <button id="logoutBtn" style="display:none;">登出</button>
      </nav>
    </div>
  </header>
  <main>
    <div class="tab-container">
      <div class="tab-buttons">
        <button class="tab-btn active" onclick="switchTab('products')">兌換內容</button>
        <button class="tab-btn" onclick="switchTab('redemptions')">兌換紀錄</button>
      </div>

      <div class="tab-content">
        <!-- 兌換內容標籤頁 -->
        <div id="productsTab" class="tab-pane active">
          <section class="products-section">
            <h3>兌換內容管理</h3>
            <button class="add-product-btn" onclick="openProductModal()">新增商品</button>
            <div id="productsGrid" class="product-grid">
              <div class="loading">載入商品中...</div>
            </div>
          </section>
        </div>

        <!-- 兌換紀錄標籤頁 -->
        <div id="redemptionsTab" class="tab-pane">
          <section class="products-section">
            <h3>兌換紀錄</h3>
            <div class="redemption-filters">
              <select id="statusFilter">
                <option value="">所有狀態</option>
                <option value="pending">處理中</option>
                <option value="completed">已完成</option>
                <option value="cancelled">已取消</option>
              </select>
              <input type="text" id="searchInput" placeholder="搜尋用戶名稱或商品名稱..." />
            </div>
            <div id="redemptionsGrid" class="redemptions-grid">
              <div class="loading">載入兌換記錄中...</div>
            </div>
          </section>
        </div>
      </div>
    </div>

    <!-- 商品編輯模態框 -->
    <div id="productModal" class="modal">
      <div class="modal-content">
        <span class="close-btn" onclick="closeProductModal()">&times;</span>
        <h3 id="modalTitle">新增商品</h3>
        <form id="productForm">
          <div class="form-group">
            <label>商品名稱</label>
            <input type="text" name="name" required />
          </div>
          <div class="form-group">
            <label>商品描述</label>
            <textarea name="description" placeholder="輸入商品描述..."></textarea>
          </div>
          <div class="form-group">
            <label>圖片網址</label>
            <input type="url" name="image_url" placeholder="https://..." />
            <div style="margin-top: 5px; font-size: 0.9em; color: #666;">或上傳圖片：</div>
            <input type="file" id="productImageFile" accept="image/*" style="margin-top: 5px;" />
            <div id="imagePreviewContainer" style="display: none; margin-top: 10px;">
              <img id="imagePreview" src="" alt="預覽圖片" style="max-width: 150px; max-height: 150px; border: 1px solid #ddd; border-radius: 4px;" />
            </div>
          </div>
          <div class="form-group">
            <label>所需積分</label>
            <input type="number" name="points_required" min="1" required />
          </div>
          <div class="form-group">
            <label>庫存數量</label>
            <input type="number" name="stock" min="0" required />
          </div>
          <div class="form-actions">
            <button type="button" class="cancel-btn" onclick="closeProductModal()">取消</button>
            <button type="submit" class="save-btn">儲存</button>
          </div>
        </form>
      </div>
    </div>
  </main>
  <footer>
    &copy; 2026 沙丘 AI 實境遊戲平台 | <a href="https://laijiubo.zeabur.app/" target="_blank" style="color: #6b7280; text-decoration: none;">來就補多媒體行銷 製作</a>
  </footer>
  <script>
    // 權限檢查與帳號顯示
    window.loginUser = JSON.parse(localStorage.getItem('loginUser') || 'null');
    if (!window.loginUser || (window.loginUser.role !== 'shop' && window.loginUser.role !== 'admin')) {
      document.body.innerHTML = '<div style="max-width:400px;margin:80px auto;text-align:center;font-size:1.2em;color:#c00;">僅限工作人員或管理員登入後使用</div>';
      throw new Error('No permission');
    }
    document.getElementById('loginUserInfo').textContent = getUserDisplayName(window.loginUser);
    document.getElementById('logoutBtn').onclick = function() {
      localStorage.removeItem('loginUser');
      window.location.href = '/login.html';
    };
    document.getElementById('logoutBtn').style.display = '';

    // 動態顯示 staff/admin 導覽
    if (window.loginUser && window.loginUser.role === 'admin') {
      document.getElementById('navStaff').style.display = '';
      // document.getElementById('navRedeem').style.display = ''; // 已經預設顯示
    } else if (window.loginUser && window.loginUser.role === 'shop') {
      // document.getElementById('navRedeem').style.display = ''; // 已經預設顯示
    }
    
    // 工作人員與管理員不顯示任務列表和用戶任務管理
    if (window.loginUser && (window.loginUser.role === 'shop' || window.loginUser.role === 'admin')) {
      const navTasksList = document.getElementById('navTasksList');
      if (navTasksList) navTasksList.style.display = 'none';
      const navUserTasks = document.getElementById('navUserTasks');
      if (navUserTasks) navUserTasks.style.display = 'none';
    } else {
       // 一般用戶顯示用戶任務管理
       if (window.loginUser && window.loginUser.role === 'user') {
         const navUserTasks = document.getElementById('navUserTasks');
         if (navUserTasks) navUserTasks.style.display = '';
       }
    }

    function getUserDisplayName(loginUser) {
      switch(loginUser.role) {
        case 'admin':
          return `沙丘管理員：${loginUser.username}`;
        case 'shop':
          return `兌換工作人員：${loginUser.username}`;
        case 'user':
          return `玩家：${loginUser.username}`;
        default:
          return loginUser.username;
      }
    }

    // 漢堡選單功能
    document.getElementById('hamburgerBtn').onclick = function() {
      document.getElementById('headerContent').classList.toggle('open');
    };
    document.querySelectorAll('.main-nav a').forEach(a => {
      a.onclick = () => document.getElementById('headerContent').classList.remove('open');
    });

    // 標籤頁面切換功能
    function switchTab(tabName) {
      // 切換按鈕狀態
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      event.target.classList.add('active');

      // 切換內容區域
      document.querySelectorAll('.tab-pane').forEach(pane => {
        pane.classList.remove('active');
      });
      document.getElementById(tabName + 'Tab').classList.add('active');

      // 記錄當前標籤頁
      currentTab = tabName;

      // 載入對應的數據
      if (tabName === 'products') {
        loadProducts();
      } else if (tabName === 'redemptions') {
        loadRedemptions();
      }
    }

    // ===== 商品管理功能 =====
    function loadProducts() {
      if (!window.loginUser || !window.loginUser.username) {
        console.error('用戶信息不完整，無法載入商品');
        document.getElementById('productsGrid').innerHTML = '<div class="empty-state"><h3>載入失敗</h3><p>請重新登入</p></div>';
        return;
      }

      fetch(`${API_BASE}/api/products/admin`, {
        headers: { 'x-username': encodeURIComponent(window.loginUser.username) }
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          currentUserRole = data.userRole || window.loginUser.role; // 使用後端返回的角色信息
          displayProducts(data.products);
        } else {
          document.getElementById('productsGrid').innerHTML = '<div class="empty-state"><h3>載入失敗</h3><p>請稍後再試</p></div>';
        }
      })
      .catch(err => {
        console.error('載入商品失敗:', err);
        document.getElementById('productsGrid').innerHTML = '<div class="empty-state"><h3>載入失敗</h3><p>請稍後再試</p></div>';
      });
    }

    function displayProducts(products) {
      const container = document.getElementById('productsGrid');

      if (products.length === 0) {
        const emptyMessage = currentUserRole === 'admin'
          ? '點擊「新增商品」按鈕來添加第一個商品'
          : '目前沒有您管理的商品';
        container.innerHTML = `<div class="empty-state"><h3>還沒有商品</h3><p>${emptyMessage}</p></div>`;
        return;
      }

      container.innerHTML = '';

      products.forEach(product => {
        const productCard = document.createElement('div');
        productCard.className = 'product-card';

        const statusText = product.is_active ? '上架中' : '已下架';
        const statusColor = product.is_active ? '#28a745' : '#dc3545';
        const stockColor = product.stock <= 5 ? '#dc3545' : '#666';

        // 檢查是否可以編輯/刪除此商品
        const canEdit = currentUserRole === 'admin' || (window.loginUser && window.loginUser.username && product.created_by === window.loginUser.username);
        const creatorInfo = currentUserRole === 'admin' && product.created_by
          ? `<div class="product-creator" style="font-size: 0.9em; color: #666; margin-bottom: 10px;">創建者：${product.created_by}</div>`
          : '';

        const actionButtons = canEdit
          ? `<div class="product-actions">
              <button class="edit-btn" onclick="editProduct(${product.id})">編輯</button>
              <button class="delete-btn" onclick="deleteProduct(${product.id}, '${product.name}')">刪除</button>
             </div>`
          : `<div class="product-actions" style="justify-content: center;">
              <span style="color: #999; font-size: 0.9em;">只讀模式</span>
             </div>`;

        productCard.innerHTML = `
          ${creatorInfo}
          <div class="product-name">${product.name}</div>
          <div class="product-points">${product.points_required} 積分</div>
          <div class="product-stock" style="color: ${stockColor}">庫存：${product.stock}</div>
          <div style="margin-bottom: 15px; color: ${statusColor}; font-weight: 600;">${statusText}</div>
          ${actionButtons}
        `;

        container.appendChild(productCard);
      });
    }

    function openProductModal(productId = null) {
      currentEditingProductId = productId;
      const modal = document.getElementById('productModal');
      const form = document.getElementById('productForm');
      const modalTitle = document.getElementById('modalTitle');
      
      // 重置預覽
      document.getElementById('productImageFile').value = '';
      document.getElementById('imagePreviewContainer').style.display = 'none';
      document.getElementById('imagePreview').src = '';

      if (productId) {
        modalTitle.textContent = '編輯商品';
        // 載入商品數據
        fetch(`${API_BASE}/api/products/admin`, {
          headers: { 'x-username': encodeURIComponent(window.loginUser.username) }
        })
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            const product = data.products.find(p => p.id == productId);
            if (product) {
              form.name.value = product.name;
              form.description.value = product.description || '';
              form.image_url.value = product.image_url || '';
              form.points_required.value = product.points_required;
              form.stock.value = product.stock;
              
              // 顯示現有圖片預覽
              if (product.image_url) {
                document.getElementById('imagePreview').src = product.image_url;
                document.getElementById('imagePreviewContainer').style.display = 'block';
              }
            }
          }
        });
      } else {
        modalTitle.textContent = '新增商品';
        form.reset();
      }

      modal.style.display = 'block';
    }

    function closeProductModal() {
      document.getElementById('productModal').style.display = 'none';
      currentEditingProductId = null;
    }
    
    // 監聽文件選擇變更以預覽
    document.getElementById('productImageFile').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          document.getElementById('imagePreview').src = e.target.result;
          document.getElementById('imagePreviewContainer').style.display = 'block';
        };
        reader.readAsDataURL(file);
      }
    });

    // 商品表單提交
    document.getElementById('productForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const formData = new FormData(this);
      let imageUrl = formData.get('image_url');
      
      // 處理圖片上傳
      const imageFile = document.getElementById('productImageFile').files[0];
      if (imageFile) {
        try {
          const uploadFormData = new FormData();
          uploadFormData.append('photo', imageFile);
          
          // 顯示上傳中提示 (可選)
          const submitBtn = this.querySelector('button[type="submit"]');
          const originalBtnText = submitBtn.textContent;
          submitBtn.textContent = '圖片上傳中...';
          submitBtn.disabled = true;
          
          const uploadRes = await fetch(`${API_BASE}/api/upload`, {
            method: 'POST',
            headers: { 'x-username': encodeURIComponent(window.loginUser.username) },
            body: uploadFormData
          });
          
          const uploadData = await uploadRes.json();
          
          if (uploadData.success) {
            imageUrl = uploadData.url;
          } else {
            alert('圖片上傳失敗: ' + (uploadData.message || '未知錯誤'));
            submitBtn.textContent = originalBtnText;
            submitBtn.disabled = false;
            return;
          }
          
          submitBtn.textContent = originalBtnText;
          submitBtn.disabled = false;
        } catch (err) {
          console.error('上傳錯誤:', err);
          alert('圖片上傳發生錯誤');
          return;
        }
      }

      const productData = {
        name: formData.get('name'),
        description: formData.get('description'),
        image_url: imageUrl,
        points_required: parseInt(formData.get('points_required')),
        stock: parseInt(formData.get('stock'))
      };

      const url = currentEditingProductId
        ? `${API_BASE}/api/products/${currentEditingProductId}`
        : `${API_BASE}/api/products`;

      const method = currentEditingProductId ? 'PUT' : 'POST';

      fetch(url, {
        method: method,
        headers: {
          'Content-Type': 'application/json',
          'x-username': encodeURIComponent(window.loginUser.username)
        },
        credentials: 'include', // 發送 cookies (JWT)，確保認證資訊傳遞
        body: JSON.stringify(productData)
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          alert(currentEditingProductId ? '商品更新成功！' : '商品新增成功！');
          closeProductModal();
          loadProducts();
        } else {
          alert(data.message || '操作失敗');
        }
      })
      .catch(err => {
        console.error('操作失敗:', err);
        alert('操作失敗，請稍後再試');
      });
    });

    function editProduct(productId) {
      openProductModal(productId);
    }

    function deleteProduct(productId, productName) {
      if (!confirm(`確定要刪除商品「${productName}」嗎？此操作無法復原。`)) {
        return;
      }

      fetch(`${API_BASE}/api/products/${productId}`, {
        method: 'DELETE',
        headers: { 'x-username': encodeURIComponent(window.loginUser.username) }
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          alert('商品刪除成功！');
          loadProducts();
        } else {
          alert(data.message || '刪除失敗');
        }
      })
      .catch(err => {
        console.error('刪除失敗:', err);
        alert('刪除失敗，請稍後再試');
      });
    }

    // 點擊模態框外部關閉
    window.onclick = function(event) {
      const modal = document.getElementById('productModal');
      if (event.target == modal) {
        closeProductModal();
      }
    };

    // 查看用戶任務詳情
    window.viewUserTasks = function(username) {
      // 將用戶信息存儲到localStorage，用於個人任務管理頁面
      const userInfo = { username: username, role: 'user' };
      localStorage.setItem('viewUser', JSON.stringify(userInfo));

      // 跳轉到個人任務管理頁面
      window.location.href = '/admin-user-tasks.html';
    };

    // ===== 初始化載入數據 =====
    const API_BASE = '';
    
    if (window.loginUser) {
      // 載入商品數據
      loadProducts();

      // 載入兌換記錄數據
      loadRedemptions();
    }

    // ===== 兌換記錄管理功能 =====

    function loadRedemptions() {
      if (!window.loginUser || !window.loginUser.username) {
        console.error('用戶信息不完整，無法載入兌換記錄');
        document.getElementById('redemptionsGrid').innerHTML = '<div class="empty-state"><h3>載入失敗</h3><p>請重新登入</p></div>';
        return;
      }

      fetch(`${API_BASE}/api/product-redemptions/admin`, {
        headers: { 'x-username': encodeURIComponent(window.loginUser.username) },
        credentials: 'include' // 發送 cookies (JWT)，確保認證資訊傳遞
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          allRedemptions = data.redemptions;
          displayRedemptions(allRedemptions);
        } else {
          document.getElementById('redemptionsGrid').innerHTML = '<div class="empty-state"><h3>載入失敗</h3><p>請稍後再試</p></div>';
        }
      })
      .catch(err => {
        console.error('載入兌換記錄失敗:', err);
        document.getElementById('redemptionsGrid').innerHTML = '<div class="empty-state"><h3>載入失敗</h3><p>請稍後再試</p></div>';
      });
    }

    function displayRedemptions(redemptions) {
      const container = document.getElementById('redemptionsGrid');

      if (redemptions.length === 0) {
        container.innerHTML = '<div class="empty-state"><h3>沒有兌換記錄</h3><p>目前沒有任何商品兌換記錄</p></div>';
        return;
      }

      container.innerHTML = '';

      redemptions.forEach(redemption => {
        const statusClass = redemption.status;
        const statusText = getRedemptionStatusText(redemption.status);

        const redemptionCard = document.createElement('div');
        redemptionCard.className = 'redemption-card';

        const redeemedAt = new Date(redemption.redeemed_at).toLocaleString('zh-TW', {
          year: 'numeric',
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit'
        });

        // 檢查是否可以處理此兌換記錄（管理員或商品創建者）
        const canProcess = currentUserRole === 'admin' ||
                          (redemption.created_by && window.loginUser && window.loginUser.username && redemption.created_by === window.loginUser.username);

        const actionsHtml = (redemption.status === 'pending' && canProcess)
          ? `
            <div class="redemption-actions">
              <button class="process-btn" onclick="processRedemption(${redemption.id}, 'completed')">完成兌換</button>
              <button class="cancel-btn" onclick="processRedemption(${redemption.id}, 'cancelled')">取消兌換</button>
            </div>
          `
          : (redemption.status === 'pending' && !canProcess)
          ? `<div class="redemption-actions" style="justify-content: center;">
              <span style="color: #999; font-size: 0.9em;">只讀模式</span>
             </div>`
          : '';

        redemptionCard.innerHTML = `
          <div class="redemption-header">
            <div>
              <div class="redemption-product">${redemption.product_name}</div>
              <div style="font-size: 0.9em; color: #666; margin-bottom: 5px;">🏪 商家：${redemption.merchant_name || '未知'}</div>
              <div class="redemption-user" style="cursor: pointer;" onclick="viewUserTasks('${redemption.username}')">👤 玩家：${redemption.username}</div>
            </div>
            <div class="redemption-status ${statusClass}">${statusText}</div>
          </div>
          <div class="redemption-meta">
            <div>兌換時間：${redeemedAt}</div>
            <div class="redemption-points">消耗積分：${redemption.points_used}</div>
          </div>
          ${redemption.notes ? `<div style="margin-bottom: 15px; color: #666; font-style: italic;">備註：${redemption.notes}</div>` : ''}
          ${actionsHtml}
        `;

        container.appendChild(redemptionCard);
      });
    }

    function getRedemptionStatusText(status) {
      switch(status) {
        case 'pending': return '處理中';
        case 'completed': return '已完成';
        case 'cancelled': return '已取消';
        default: return status;
      }
    }

    function processRedemption(redemptionId, status) {
      const actionText = status === 'completed' ? '完成' : '取消';
      const notes = prompt(`請輸入${actionText}兌換的備註（可選）：`);

      fetch(`${API_BASE}/api/product-redemptions/${redemptionId}/status`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'x-username': encodeURIComponent(window.loginUser.username)
        },
        body: JSON.stringify({ status, notes })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          alert(data.message);
          loadRedemptions(); // 重新載入數據
          if (currentTab === 'products') {
            loadProducts();
          }
        } else {
          alert(data.message || '操作失敗');
        }
      })
      .catch(err => {
        console.error('處理兌換失敗:', err);
        alert('操作失敗，請稍後再試');
      });
    }

    // 篩選功能
    let currentTab = 'products';

    document.getElementById('statusFilter').addEventListener('change', function() {
      filterRedemptions();
    });

    document.getElementById('searchInput').addEventListener('input', function() {
      filterRedemptions();
    });

    function filterRedemptions() {
      const statusFilter = document.getElementById('statusFilter').value;
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();

      let filteredRedemptions = allRedemptions;

      // 狀態篩選
      if (statusFilter) {
        filteredRedemptions = filteredRedemptions.filter(r => r.status === statusFilter);
      }

      // 搜尋篩選
      if (searchTerm) {
        filteredRedemptions = filteredRedemptions.filter(r =>
          r.username.toLowerCase().includes(searchTerm) ||
          r.product_name.toLowerCase().includes(searchTerm)
        );
      }

      displayRedemptions(filteredRedemptions);
    }
  </script>
  <script src="/js/nav-access.js"></script>
</body>
</html>
