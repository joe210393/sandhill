<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>關卡簡報 | 海底大作戰</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" type="image/png" href="/images/mascot.png" />
  <style>
    :root {
      --stage-deep: #073b4c;
      --stage-sea: #0e7490;
      --stage-sand: #f5e7b8;
      --stage-mint: #dff6f2;
      --stage-coral: #ff7f50;
      --stage-ink: #16323c;
      --stage-soft: #67808b;
      --stage-line: rgba(14, 116, 144, 0.14);
      --stage-shadow: 0 24px 60px rgba(8, 44, 58, 0.14);
    }

    body {
      background:
        radial-gradient(circle at top left, rgba(255, 127, 80, 0.12), transparent 24%),
        radial-gradient(circle at top right, rgba(14, 116, 144, 0.12), transparent 22%),
        linear-gradient(180deg, #eefcff 0%, #f8fcfa 48%, #fff9ef 100%);
      color: var(--stage-ink);
    }

    header {
      background: rgba(7, 59, 76, 0.86);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }

    .main-nav a.current-page {
      background-color: rgba(255, 255, 255, 0.18);
    }

    .main-nav button {
      background: linear-gradient(135deg, #f97316, #fb923c);
    }

    .stage-shell {
      max-width: 1120px;
      margin: 0 auto;
      padding: 28px 18px 80px;
    }

    .stage-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(320px, 0.8fr);
      gap: 24px;
    }

    .stage-panel {
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.56);
      border-radius: 28px;
      box-shadow: var(--stage-shadow);
      overflow: hidden;
      backdrop-filter: blur(12px);
    }

    .stage-hero {
      position: relative;
      min-height: 320px;
      background: linear-gradient(180deg, rgba(7, 59, 76, 0.12), rgba(7, 59, 76, 0.02));
    }

    .stage-hero img {
      width: 100%;
      height: 320px;
      object-fit: cover;
      display: block;
    }

    .stage-overlay {
      position: absolute;
      inset: auto 0 0 0;
      padding: 22px 24px 24px;
      background: linear-gradient(180deg, rgba(7, 59, 76, 0), rgba(7, 59, 76, 0.78));
      color: white;
    }

    .stage-chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
    }

    .stage-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      font-size: 0.86rem;
      font-weight: 700;
    }

    .stage-overlay h1 {
      margin: 0;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      line-height: 1.15;
    }

    .stage-content {
      padding: 24px;
    }

    .stage-copy {
      font-size: 1rem;
      line-height: 1.9;
      color: var(--stage-soft);
      margin-bottom: 20px;
    }

    .stage-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 18px;
    }

    .stage-btn {
      border: none;
      border-radius: 999px;
      padding: 14px 20px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .stage-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 24px rgba(7, 59, 76, 0.14);
    }

    .stage-btn.primary {
      background: linear-gradient(135deg, #0e7490, #14b8a6);
      color: white;
    }

    .stage-btn.secondary {
      background: white;
      color: var(--stage-deep);
      border: 1px solid rgba(7, 59, 76, 0.12);
    }

    .stage-status {
      min-height: 54px;
      padding: 14px 16px;
      border-radius: 18px;
      background: var(--stage-mint);
      color: var(--stage-deep);
      font-weight: 700;
      line-height: 1.7;
      white-space: pre-line;
    }

    .stage-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin: 18px 0 0;
    }

    .meta-card {
      padding: 14px 16px;
      border-radius: 18px;
      background: #f8fcfd;
      border: 1px solid var(--stage-line);
    }

    .meta-card strong {
      display: block;
      color: var(--stage-deep);
      margin-bottom: 6px;
      font-size: 0.9rem;
    }

    .meta-card span {
      color: var(--stage-soft);
      line-height: 1.6;
      font-size: 0.95rem;
    }

    .side-panel {
      padding: 24px;
      display: grid;
      gap: 18px;
      align-content: start;
    }

    .flow-card,
    .challenge-card,
    .reward-card {
      padding: 20px;
      border-radius: 22px;
      background: #fcffff;
      border: 1px solid var(--stage-line);
    }

    .flow-card h2,
    .challenge-card h2,
    .reward-card h2 {
      margin: 0 0 12px;
      font-size: 1.15rem;
      color: var(--stage-deep);
    }

    .flow-list {
      display: grid;
      gap: 12px;
    }

    .flow-step {
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 12px;
      align-items: start;
    }

    .flow-no {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      background: linear-gradient(135deg, #0e7490, #14b8a6);
      color: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 0.92rem;
    }

    .flow-step strong {
      display: block;
      margin-bottom: 4px;
      color: var(--stage-ink);
    }

    .flow-step p,
    .reward-card p,
    .challenge-card p {
      margin: 0;
      color: var(--stage-soft);
      line-height: 1.7;
    }

    .challenge-card {
      display: none;
    }

    .challenge-card.open {
      display: block;
    }

    .challenge-header {
      margin-bottom: 14px;
    }

    .challenge-note {
      padding: 12px 14px;
      border-radius: 14px;
      background: #eef8fb;
      color: #0d6177;
      font-size: 0.94rem;
      line-height: 1.7;
      margin-bottom: 14px;
    }

    .challenge-box {
      padding: 18px;
      border-radius: 18px;
      background: #f8fbfc;
      border: 1px dashed rgba(14, 116, 144, 0.22);
    }

    .challenge-box input[type="file"],
    .challenge-box input[type="number"],
    .challenge-box input[type="text"],
    .challenge-box textarea {
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 10px;
      padding: 11px 12px;
      border-radius: 12px;
      border: 1px solid rgba(14, 116, 144, 0.18);
      font-size: 1rem;
      background: white;
    }

    .preview-image {
      display: none;
      max-width: 100%;
      border-radius: 16px;
      margin-top: 10px;
      box-shadow: 0 14px 28px rgba(7, 59, 76, 0.08);
    }

    .answer-msg {
      min-height: 28px;
      margin-top: 10px;
      color: #0e7490;
      white-space: pre-line;
      line-height: 1.7;
      font-weight: 700;
    }

    .attempt-history {
      margin-top: 16px;
      display: grid;
      gap: 10px;
    }

    .attempt-card {
      padding: 12px 14px;
      border-radius: 14px;
      background: white;
      border: 1px solid rgba(14, 116, 144, 0.12);
      line-height: 1.7;
      color: var(--stage-soft);
    }

    .attempt-card strong {
      color: var(--stage-ink);
    }

    .next-stage-box {
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 16px;
      background: #fff7ed;
      color: #9a3412;
      line-height: 1.7;
      font-weight: 700;
    }

    @media (max-width: 900px) {
      .stage-layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header id="mainHeader">
    <div class="header-content" id="headerContent">
      <h1 id="pageTitle">關卡簡報</h1>
      <button id="hamburgerBtn" class="hamburger" aria-label="展開選單">&#9776;</button>
      <nav class="main-nav">
        <a href="/index.html">首頁</a>
        <a href="/map.html">關卡地圖</a>
        <a href="/tasks-list.html" id="navTasksList">關卡列表</a>
        <a href="/ai-lab.html">海底探索艙</a>
        <a href="/user-tasks.html">任務紀錄</a>
        <a href="/staff-dashboard.html" id="navStaff" style="display:none;">建立關卡</a>
        <a href="/role-management.html" id="navRoleMgmt" style="display:none;">權限管理</a>
        <a href="/user-dashboard.html" id="navUserTasks" style="display:none;">玩家管理</a>
        <a href="/products.html">獎勵兌換</a>
        <a href="/redeem-tasks.html" id="navRedeem" style="display:none;">兌換管理</a>
        <span id="loginUserInfo" style="display:none;color:#e2f7ff;padding:0.5rem 1rem;"></span>
        <button id="logoutBtn" style="display:none;">登出</button>
      </nav>
    </div>
  </header>

  <main class="stage-shell">
    <div id="loadingState" class="stage-panel" style="padding:26px; text-align:center; color:#55717d;">
      載入關卡中...
    </div>
    <div id="taskApp" style="display:none;"></div>
  </main>

  <footer>
    &copy; 2026 海底大作戰 | 關卡冒險平台
  </footer>

  <script>
    const API_BASE = '';
    const loginUser = JSON.parse(localStorage.getItem('loginUser') || 'null');
    const urlParams = new URLSearchParams(window.location.search);
    const taskId = urlParams.get('id');

    window.loginUser = loginUser;

    function handleAuthExpired() {
      localStorage.removeItem('loginUser');
      alert('登入狀態已過期，請重新登入');
      window.location.href = '/login.html';
    }

    function getUserDisplayName(user) {
      switch (user.role) {
        case 'admin': return `管理員：${user.username}`;
        case 'shop': return `主辦單位：${user.username}`;
        case 'user': return `冒險者：${user.username}`;
        default: return user.username;
      }
    }

    function haversineMeters(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon / 2) * Math.sin(dLon / 2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    async function ensureNearTask(task) {
      return new Promise((resolve) => {
        if (!navigator.geolocation) {
          resolve({ ok: false, message: '裝置不支援定位，無法確認你是否到達任務點。' });
          return;
        }

        navigator.geolocation.getCurrentPosition(
          (pos) => {
            const meters = haversineMeters(pos.coords.latitude, pos.coords.longitude, Number(task.lat), Number(task.lng));
            const limit = Number(task.radius || 50) + 35;
            if (meters <= limit) {
              resolve({ ok: true, message: `已抵達任務範圍（約 ${Math.round(meters)}m）` });
            } else {
              resolve({ ok: false, message: `你目前距離任務點約 ${Math.round(meters)} 公尺，請先靠近關卡位置。` });
            }
          },
          () => resolve({ ok: false, message: '無法取得定位，請確認 GPS 已開啟後再試一次。' }),
          { enableHighAccuracy: true, timeout: 10000 }
        );
      });
    }

    function getMapUrl(task) {
      return `/map.html?focusLat=${encodeURIComponent(task.lat)}&focusLng=${encodeURIComponent(task.lng)}&taskId=${encodeURIComponent(task.id)}`;
    }

    function setupNav() {
      const userInfoSpan = document.getElementById('loginUserInfo');
      const logoutBtn = document.getElementById('logoutBtn');

      if (loginUser) {
        userInfoSpan.style.display = 'inline-block';
        userInfoSpan.textContent = getUserDisplayName(loginUser);
        logoutBtn.style.display = 'inline-block';
        logoutBtn.onclick = function() {
          localStorage.removeItem('loginUser');
          window.location.href = '/login.html';
        };

        if (loginUser.role === 'admin') {
          document.getElementById('navStaff').style.display = '';
          document.getElementById('navRedeem').style.display = '';
          document.getElementById('navRoleMgmt').style.display = '';
        } else if (loginUser.role === 'shop') {
          document.getElementById('navStaff').style.display = '';
          document.getElementById('navRedeem').style.display = '';
        } else if (loginUser.role === 'user') {
          document.getElementById('navUserTasks').style.display = '';
        }

        if (loginUser.role === 'shop' || loginUser.role === 'admin') {
          const navTasksList = document.getElementById('navTasksList');
          if (navTasksList) navTasksList.style.display = 'none';
        }
      }

      document.getElementById('hamburgerBtn').onclick = function() {
        document.getElementById('headerContent').classList.toggle('open');
      };
      document.querySelectorAll('.main-nav a, .main-nav button').forEach(element => {
        element.addEventListener('click', () => document.getElementById('headerContent').classList.remove('open'));
      });
    }

    async function fetchJson(url, options = {}) {
      const res = await fetch(url, { credentials: 'include', ...options });
      if (res.status === 401) {
        handleAuthExpired();
        throw new Error('unauthorized');
      }
      return res.json();
    }

    function renderAttemptHistory(attempts) {
      if (!Array.isArray(attempts) || attempts.length === 0) {
        return '<div class="attempt-card">目前還沒有挑戰紀錄。</div>';
      }
      return attempts.map(attempt => `
        <div class="attempt-card">
          <strong>第 ${attempt.attempt_no} 次 ${attempt.passed ? '通過' : '未通過'}</strong>
          ${attempt.failure_reason ? `<div>原因：${attempt.failure_reason}</div>` : ''}
          ${attempt.retry_advice ? `<div>建議：${attempt.retry_advice}</div>` : ''}
          ${attempt.detected_count !== null && attempt.detected_count !== undefined ? `<div>辨識數量：${attempt.detected_count}</div>` : ''}
          ${attempt.score !== null && attempt.score !== undefined ? `<div>AI 分數：${attempt.score}</div>` : ''}
        </div>
      `).join('');
    }

    function renderChallenge(task, userTaskId, currentAnswer = '') {
      const attemptsHtmlId = 'attemptHistory';
      const isAiTask = task.validation_mode && task.validation_mode.startsWith('ai_');
      const locationHint = task.validation_mode === 'ai_reference_match'
        ? '這一關會拿關卡封面圖當參考畫面，比對你上傳的照片是否夠接近。'
        : '抵達任務點後再開始挑戰，系統會依照這一關的規則幫你判定。';

      let challengeInner = '';
      if (task.task_type === 'photo') {
        challengeInner = `
          <input id="photoInput" type="file" accept="image/*">
          <img id="photoPreview" class="preview-image" alt="預覽圖">
          <button id="submitChallengeBtn" class="stage-btn primary" style="width:100%; margin-top:8px;">${isAiTask ? '送出照片，開始判定' : '上傳照片'}</button>
        `;
      } else if (task.task_type === 'multiple_choice') {
        const options = Array.isArray(task.options) ? task.options : (typeof task.options === 'string' ? JSON.parse(task.options || '[]') : []);
        challengeInner = `
          ${options.map((option, index) => `
            <label style="display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;">
              <input type="radio" name="mcOption" value="${String(option).replace(/"/g, '&quot;')}" ${currentAnswer === option ? 'checked' : ''}>
              <span>${option}</span>
            </label>
          `).join('')}
          <button id="submitChallengeBtn" class="stage-btn primary" style="width:100%; margin-top:8px;">送出答案</button>
        `;
      } else if (task.task_type === 'number') {
        challengeInner = `
          <input id="numberAnswerInput" type="number" placeholder="輸入數字答案" value="${currentAnswer || ''}">
          <button id="submitChallengeBtn" class="stage-btn primary" style="width:100%; margin-top:8px;">送出答案</button>
        `;
      } else if (task.task_type === 'keyword') {
        challengeInner = `
          <input id="keywordAnswerInput" type="text" placeholder="輸入關鍵字" value="${currentAnswer || ''}">
          <button id="submitChallengeBtn" class="stage-btn primary" style="width:100%; margin-top:8px;">送出答案</button>
        `;
      } else if (task.task_type === 'location') {
        challengeInner = `
          <button id="submitChallengeBtn" class="stage-btn primary" style="width:100%; margin-top:8px;">確認我已到達任務點</button>
        `;
      } else {
        challengeInner = `
          <textarea id="textAnswerInput" rows="4" placeholder="輸入你的答案">${currentAnswer || ''}</textarea>
          <button id="submitChallengeBtn" class="stage-btn primary" style="width:100%; margin-top:8px;">送出答案</button>
        `;
      }

      return `
        <div id="challengeCard" class="challenge-card">
          <div class="challenge-header">
            <h2>開始挑戰這一關</h2>
            <p>${task.name}</p>
          </div>
          <div class="challenge-note">${locationHint}</div>
          <div class="challenge-box">
            ${challengeInner}
            <div id="answerMsg" class="answer-msg"></div>
            <div id="${attemptsHtmlId}" class="attempt-history"></div>
          </div>
        </div>
      `;
    }

    async function loadAttemptHistory(userTaskId) {
      if (!userTaskId) return;
      const container = document.getElementById('attemptHistory');
      if (!container) return;
      container.innerHTML = '<div class="attempt-card">載入挑戰紀錄中...</div>';
      try {
        const data = await fetchJson(`${API_BASE}/api/user-tasks/${userTaskId}/attempts`);
        container.innerHTML = renderAttemptHistory(data.attempts);
      } catch (err) {
        container.innerHTML = '<div class="attempt-card">載入挑戰紀錄失敗。</div>';
      }
    }

    async function submitStandardAnswer(task, userTaskId, answer) {
      return fetchJson(`${API_BASE}/api/user-tasks/${userTaskId}/answer`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ answer })
      });
    }

    async function renderTaskPage(task) {
      const taskApp = document.getElementById('taskApp');
      const loadingState = document.getElementById('loadingState');
      const mapUrl = getMapUrl(task);
      let userTaskId = null;
      let currentAnswer = '';
      let completedTask = null;
      let inProgressTask = null;
      let nextTask = null;

      if (loginUser && loginUser.username) {
        const userTasksData = await fetchJson(`${API_BASE}/api/user-tasks/all?username=${encodeURIComponent(loginUser.username)}`);
        if (userTasksData.success && Array.isArray(userTasksData.tasks)) {
          completedTask = userTasksData.tasks.find(item => Number(item.id) === Number(task.id) && item.status === '完成');
          inProgressTask = userTasksData.tasks.find(item => Number(item.id) === Number(task.id) && item.status === '進行中');
          if (inProgressTask) {
            userTaskId = inProgressTask.user_task_id;
            currentAnswer = inProgressTask.answer || '';
          }
        }

        if (task.type === 'quest' && task.quest_chain_id && task.quest_order) {
          const tasksData = await fetchJson(`${API_BASE}/api/tasks`);
          if (tasksData.success && Array.isArray(tasksData.tasks)) {
            nextTask = tasksData.tasks.find(item =>
              Number(item.quest_chain_id) === Number(task.quest_chain_id) &&
              Number(item.quest_order) === Number(task.quest_order) + 1
            );
          }
        }
      }

      const statusText = completedTask
        ? '這一關已經完成。'
        : inProgressTask
          ? '關卡已接下，下一步請直接前往地圖抵達任務點。'
          : '這一頁是關卡簡報。接下任務後，系統會直接把你帶去地圖。';

      const aiTypeMap = {
        ai_count: 'AI 數量判定',
        ai_identify: 'AI 目標辨識',
        ai_score: 'AI 圖像評分',
        ai_rule_check: 'AI 規則檢查',
        ai_reference_match: 'AI 地點照片比對'
      };

      taskApp.innerHTML = `
        <div class="stage-layout">
          <section class="stage-panel">
            <div class="stage-hero">
              <img src="${task.photoUrl}" alt="${task.name}" onerror="this.src='/images/mascot.png'">
              <div class="stage-overlay">
                <div class="stage-chip-row">
                  <span class="stage-chip">${task.type === 'quest' ? `劇情第 ${task.quest_order || '?'} 關` : '單次關卡'}</span>
                  <span class="stage-chip">${task.validation_mode && aiTypeMap[task.validation_mode] ? aiTypeMap[task.validation_mode] : '現場挑戰'}</span>
                </div>
                <h1>${task.name}</h1>
              </div>
            </div>
            <div class="stage-content">
              <div class="stage-copy">${task.description}</div>
              <div class="stage-actions">
                <button id="primaryStageBtn" class="stage-btn primary">${completedTask ? '查看下一關' : inProgressTask ? '開啟關卡地圖' : '接下這一關，前往地圖'}</button>
                <button id="reachStageBtn" class="stage-btn secondary" ${completedTask ? 'style="display:none;"' : ''}>我已抵達任務點，開始挑戰</button>
              </div>
              <div id="taskStatus" class="stage-status">${statusText}</div>
              <div class="stage-grid">
                <div class="meta-card">
                  <strong>關卡座標</strong>
                  <span>${task.lat}, ${task.lng}</span>
                </div>
                <div class="meta-card">
                  <strong>有效半徑</strong>
                  <span>${task.radius || 0} 公尺</span>
                </div>
                <div class="meta-card">
                  <strong>完成獎勵</strong>
                  <span>${task.points || 0} 積分${task.reward_item_name ? `＋${task.reward_item_name}` : ''}</span>
                </div>
              </div>
            </div>
          </section>

          <aside class="stage-panel side-panel">
            <section class="flow-card">
              <h2>這一關怎麼玩</h2>
              <div class="flow-list">
                <div class="flow-step">
                  <span class="flow-no">1</span>
                  <div>
                    <strong>先接下關卡</strong>
                    <p>從這頁確認任務目標後，直接進地圖，不在這裡卡住玩家。</p>
                  </div>
                </div>
                <div class="flow-step">
                  <span class="flow-no">2</span>
                  <div>
                    <strong>前往任務點</strong>
                    <p>地圖才是主舞台，玩家應該被帶去任務地點，而不是停在工具介面。</p>
                  </div>
                </div>
                <div class="flow-step">
                  <span class="flow-no">3</span>
                  <div>
                    <strong>抵達後再開始挑戰</strong>
                    <p>確認你已經到點，才展開這一關的挑戰面板與提交流程。</p>
                  </div>
                </div>
                <div class="flow-step">
                  <span class="flow-no">4</span>
                  <div>
                    <strong>通關後往下一關</strong>
                    <p>關卡感比辨識感更重要，所以所有回饋都會圍繞「是否解鎖下一段冒險」。</p>
                  </div>
                </div>
              </div>
            </section>

            <section class="reward-card">
              <h2>關卡提示</h2>
              <p>${task.validation_mode === 'ai_reference_match'
                ? '最後一關是地點照片比對。系統會拿封面圖當參考畫面，請讓你的拍攝角度盡量接近。'
                : task.validation_mode && task.validation_mode.startsWith('ai_')
                  ? '這是一關 AI 驗證任務。拍照後系統會判斷是否通過，若失敗會告訴你該怎麼重拍。'
                  : '這一關會依題型要求你輸入答案或確認位置。'}</p>
              ${task.max_attempts ? `<p style="margin-top:10px;">最多可挑戰 ${task.max_attempts} 次。</p>` : ''}
              ${nextTask ? `<div class="next-stage-box">完成這一關後，下一關「${nextTask.name}」會接著解鎖。</div>` : ''}
            </section>

            ${renderChallenge(task, userTaskId, currentAnswer)}
          </aside>
        </div>
      `;

      loadingState.style.display = 'none';
      taskApp.style.display = 'block';

      const statusEl = document.getElementById('taskStatus');
      const primaryBtn = document.getElementById('primaryStageBtn');
      const reachBtn = document.getElementById('reachStageBtn');
      const challengeCard = document.getElementById('challengeCard');

      primaryBtn.onclick = async function() {
        if (completedTask) {
          if (nextTask) {
            window.location.href = `/task-detail.html?id=${nextTask.id}`;
          } else {
            statusEl.textContent = '這條劇情線目前已完成，可以回到地圖看看其他關卡。';
          }
          return;
        }

        if (!loginUser || !loginUser.username) {
          statusEl.textContent = '請先登入後再接下這一關。';
          return;
        }

        if (loginUser.role === 'shop') {
          statusEl.textContent = '工作人員帳號無法參與任務。';
          return;
        }

        if (!inProgressTask) {
          const resp = await fetchJson(`${API_BASE}/api/user-tasks`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: loginUser.username, task_id: task.id })
          });
          if (!resp.success) {
            statusEl.textContent = resp.message || '接關失敗，請稍後再試。';
            return;
          }
        }

        statusEl.textContent = '關卡已接下，正在帶你前往地圖。';
        window.location.href = mapUrl;
      };

      reachBtn.onclick = async function() {
        if (!loginUser || !loginUser.username) {
          statusEl.textContent = '請先登入後再開始挑戰。';
          return;
        }

        if (completedTask) {
          statusEl.textContent = '這一關已經完成。';
          return;
        }

        if (!inProgressTask) {
          statusEl.textContent = '請先接下這一關，再前往地圖。';
          return;
        }

        const nearResult = await ensureNearTask(task);
        statusEl.textContent = nearResult.message;
        if (!nearResult.ok) return;

        challengeCard.classList.add('open');
        challengeCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
        loadAttemptHistory(userTaskId);
      };

      if (completedTask) {
        challengeCard.classList.remove('open');
        reachBtn.style.display = 'none';
        return;
      }

      if (inProgressTask) {
        primaryBtn.textContent = '開啟關卡地圖';
      }

      const answerMsg = () => document.getElementById('answerMsg');

      const photoInput = document.getElementById('photoInput');
      const photoPreview = document.getElementById('photoPreview');
      if (photoInput && photoPreview) {
        photoInput.addEventListener('change', (event) => {
          const file = event.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (ev) => {
            photoPreview.src = ev.target.result;
            photoPreview.style.display = 'block';
          };
          reader.readAsDataURL(file);
        });
      }

      const submitBtn = document.getElementById('submitChallengeBtn');
      if (!submitBtn) return;

      submitBtn.onclick = async function() {
        if (!userTaskId) {
          answerMsg().textContent = '請先接下關卡，再開始挑戰。';
          answerMsg().style.color = '#b91c1c';
          return;
        }

        try {
          if (task.task_type === 'photo') {
            const file = photoInput?.files?.[0];
            if (!file) {
              answerMsg().textContent = '請先選擇照片。';
              answerMsg().style.color = '#b91c1c';
              return;
            }

            answerMsg().textContent = task.validation_mode && task.validation_mode.startsWith('ai_') ? 'AI 正在判定這一關...' : '照片上傳中...';
            answerMsg().style.color = '#0e7490';

            if (task.validation_mode && task.validation_mode.startsWith('ai_')) {
              const fd = new FormData();
              fd.append('image', file);
              const response = await fetch(`${API_BASE}/api/ai-tasks/${task.id}/submit`, {
                method: 'POST',
                credentials: 'include',
                body: fd
              });
              const data = await response.json();
              if (!data.success) {
                answerMsg().textContent = data.message || '這一關判定失敗。';
                answerMsg().style.color = '#b91c1c';
                return;
              }

              answerMsg().textContent = data.message || (data.passed ? '這一關通過。' : '這一關尚未通過。');
              answerMsg().style.color = data.passed ? '#15803d' : '#b91c1c';
              if (data.retry_advice) {
                answerMsg().textContent += `\n${data.retry_advice}`;
              }
              userTaskId = data.user_task_id || userTaskId;
              await loadAttemptHistory(userTaskId);
              if (data.isCompleted) {
                statusEl.textContent = data.questChainCompleted
                  ? '整條劇情線已完成。你可以回到地圖繼續探索，或直接前往下一個章節。'
                  : '這一關已完成。你可以繼續前往下一關。';
                primaryBtn.textContent = nextTask ? '查看下一關' : '回到關卡地圖';
                if (!nextTask) {
                  primaryBtn.onclick = () => window.location.href = mapUrl;
                }
                reachBtn.style.display = 'none';
              }
              return;
            }

            const uploadFd = new FormData();
            uploadFd.append('photo', file);
            const uploadRes = await fetch(`${API_BASE}/api/upload`, {
              method: 'POST',
              headers: loginUser ? { 'x-username': loginUser.username } : {},
              body: uploadFd
            });
            const uploadData = await uploadRes.json();
            if (!uploadData.success) {
              answerMsg().textContent = uploadData.message || '照片上傳失敗。';
              answerMsg().style.color = '#b91c1c';
              return;
            }
            const submitData = await submitStandardAnswer(task, userTaskId, uploadData.url);
            answerMsg().textContent = submitData.message || '這一關已更新。';
            answerMsg().style.color = submitData.success ? '#15803d' : '#b91c1c';
            return;
          }

          if (task.task_type === 'location') {
            const nearResult = await ensureNearTask(task);
            answerMsg().textContent = nearResult.ok ? '位置正確，正在送出...' : nearResult.message;
            answerMsg().style.color = nearResult.ok ? '#0e7490' : '#b91c1c';
            if (!nearResult.ok) return;
            const submitData = await submitStandardAnswer(task, userTaskId, 'ARRIVED');
            answerMsg().textContent = submitData.message || '位置驗證完成。';
            answerMsg().style.color = submitData.success ? '#15803d' : '#b91c1c';
            return;
          }

          let answer = '';
          if (task.task_type === 'multiple_choice') {
            const selected = document.querySelector('input[name="mcOption"]:checked');
            answer = selected ? selected.value : '';
          } else if (task.task_type === 'number') {
            answer = document.getElementById('numberAnswerInput').value.trim();
          } else if (task.task_type === 'keyword') {
            answer = document.getElementById('keywordAnswerInput').value.trim();
          } else {
            answer = document.getElementById('textAnswerInput').value.trim();
          }

          if (!answer) {
            answerMsg().textContent = '請先完成這一關的作答。';
            answerMsg().style.color = '#b91c1c';
            return;
          }

          answerMsg().textContent = '送出中...';
          answerMsg().style.color = '#0e7490';
          const submitData = await submitStandardAnswer(task, userTaskId, answer);
          answerMsg().textContent = submitData.message || '這一關已更新。';
          answerMsg().style.color = submitData.success ? '#15803d' : '#b91c1c';
        } catch (error) {
          answerMsg().textContent = '提交失敗，請稍後再試。';
          answerMsg().style.color = '#b91c1c';
        }
      };
    }

    setupNav();

    if (!taskId) {
      document.getElementById('loadingState').textContent = '未指定關卡 ID。';
    } else {
      fetchJson(`${API_BASE}/api/tasks/${taskId}`)
        .then((data) => {
          if (!data.success || !data.task) {
            document.getElementById('loadingState').textContent = '找不到這一關。';
            return;
          }
          renderTaskPage(data.task);
        })
        .catch(() => {
          document.getElementById('loadingState').textContent = '讀取關卡失敗，請稍後再試。';
        });
    }
  </script>
</body>
</html>
