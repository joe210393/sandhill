<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="AI 視覺實驗室：自由探索與任務模式，框選拍照、AI 辨識，支援單手框選與多張照片組合。">
    <meta name="theme-color" content="#000">
    <title>AI 視覺實驗室</title>
    <link rel="stylesheet" href="css/ai-lab.css?v=12">
    <link rel="stylesheet" href="css/mode-switch.css?v=2">
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""
    />
    <!-- 引入 SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="camera-container" role="main" aria-label="AI 視覺實驗室主畫面">
        <!-- Debug Console (hidden by default) -->
        <div id="debugConsole" style="display:none; position:fixed; top:20px; left:10px; z-index:9999; color:#0f0; background:rgba(0,0,0,0.5); font-size:12px; pointer-events:none; max-width:200px; word-break:break-all;">Debug Init...</div>

        <!-- 相機畫面 -->
        <video id="cameraFeed" autoplay playsinline muted aria-label="即時相機畫面"></video>
        
        <!-- 繪圖畫布 (覆蓋在相機上) -->
        <canvas id="drawingCanvas"></canvas>

        <!-- 單手框選：取景框 (可點擊畫面移動框的位置) -->
        <div id="reticleOverlay" class="reticle-overlay" aria-hidden="true"></div>

        <!-- AR-VIEW 整合：任務導航狀態、箭頭與可點擊任務物件 -->
        <div id="taskHudDock" class="task-hud-dock hidden">
            <button id="taskHudToggle" class="task-hud-toggle" type="button" aria-label="打開導航資訊" aria-expanded="false">
                <span class="task-hud-main-icon" aria-hidden="true">📏</span>
                <span id="taskDistanceValue" class="task-hud-main-value">--m</span>
            </button>
            <div id="taskStatusBox" class="task-status-box hidden">
                <div class="task-stat-card">
                    <span class="task-stat-icon" aria-hidden="true">🧭</span>
                    <span id="taskBearingValue" class="task-stat-value">--°</span>
                </div>
                <div class="task-stat-card">
                    <span class="task-stat-icon" aria-hidden="true">∠</span>
                    <span id="taskAngleValue" class="task-stat-value">--°</span>
                </div>
                <div class="task-stat-card task-stat-wide">
                    <span class="task-stat-icon" aria-hidden="true">📍</span>
                    <span id="taskCoordsValue" class="task-stat-value task-stat-coords">--, --</span>
                </div>
                <div class="task-stat-card task-stat-wide">
                    <span class="task-stat-icon" aria-hidden="true">🎯</span>
                    <span id="taskStatusLabel" class="task-stat-value task-stat-coords">等待任務導航...</span>
                </div>
            </div>
        </div>
        <div id="taskGuideArrow" class="task-guide-arrow hidden" aria-hidden="true"></div>
        <div id="taskTargetObj" class="task-target-obj hidden" role="button" aria-label="點擊查看任務詳情">
            <img id="taskTargetImg" src="" alt="任務封面">
            <div class="task-target-label">點擊查看詳情</div>
        </div>

        <!-- 任務互動入口（類似 AR-VIEW 點封面後的視窗） -->
        <div id="taskEncounterModal" class="task-encounter-modal hidden">
            <div class="task-encounter-card">
                <img id="taskEncounterCover" class="task-encounter-cover" src="" alt="">
                <div id="taskEncounterTitle" class="task-encounter-title"></div>
                <div class="task-encounter-actions">
                    <button id="taskEncounterClose" class="btn secondary" type="button">關閉</button>
                    <button id="taskEncounterStart" class="btn primary" type="button">✍️ 開始答題</button>
                </div>
            </div>
        </div>

        <!-- 任務答題 Modal -->
        <div id="answerModal" class="answer-modal hidden">
            <div class="answer-card">
                <div class="answer-title" id="answerTaskName">任務標題</div>
                <div class="answer-description" id="answerTaskDescription">任務描述</div>
                <div id="answerInputContainer"></div>
                <div class="answer-actions">
                    <button class="btn secondary" id="btnAnswerCancel" type="button">取消</button>
                    <button class="btn primary" id="btnAnswerSubmit" type="button">送出答案</button>
                </div>
                <div id="answerMessage" class="answer-message"></div>
            </div>
        </div>

        <!-- 數字任務密碼鎖 -->
        <div id="lockOverlay" class="lock-overlay hidden">
            <div class="lock-card">
                <div class="lock-title">🔒 旋轉密碼鎖</div>
                <div class="lock-subtitle">轉動數字輪盤後按「確定解鎖」</div>
                <div class="wheels" id="lockWheels"></div>
                <div class="lock-actions">
                    <button id="btnLockCancel" class="btn secondary" type="button">關閉</button>
                    <button id="btnLockSubmit" class="btn primary" type="button">確定解鎖</button>
                </div>
                <div id="lockMsg" class="lock-msg"></div>
            </div>
        </div>

        <!-- 任務完成 Modal -->
        <div id="completionModal" class="completion-modal hidden">
            <div class="completion-card">
                <div class="completion-icon">🎉</div>
                <div class="completion-title">任務完成！</div>
                <div id="completionReward" class="completion-reward"></div>
                <div class="completion-actions">
                    <button id="btnCompletionClose" class="btn primary" type="button">完成</button>
                </div>
            </div>
        </div>

        <!-- 透明地圖與位置資訊 -->
        <div class="mini-map-wrap">
            <button id="miniMapToggle" class="mini-map-toggle" title="切換地圖">🗺️</button>
            <button id="miniMapRefresh" class="mini-map-refresh" title="定位更新">📍</button>
            <div id="miniMap" class="mini-map"></div>
            <div id="locationInfo" class="location-info">定位中...</div>
        </div>
        
        <!-- UI 介面 -->
        <div class="ui-layer">
            <header class="header" role="banner">
                <div class="status-pill" aria-label="AI 視覺實驗室">AI Vision Lab</div>
            </header>

            <div id="featureDock" class="feature-dock">
                <button id="featureDockToggle" class="icon-btn feature-dock-toggle" type="button" aria-label="打開功能選單">☰</button>
                <div id="featureDockMenu" class="feature-dock-menu hidden">
                    <button id="backBtn" class="icon-btn exit-btn" type="button" aria-label="離開">EXIT</button>
                    <button id="taskBgmBtn" class="icon-btn hidden" type="button" title="任務背景音樂" aria-label="背景音樂">🎵</button>
                    <button id="taskIntroBtn" class="icon-btn hidden" type="button" title="景點介紹" aria-label="景點介紹">📋</button>
                    <button id="dockModeBtn" class="icon-btn" type="button" title="模式" aria-label="模式">🧭</button>
                    <button id="dockLangBtn" class="icon-btn" type="button" title="語言" aria-label="語言">語</button>
                    <button id="dockZoomBtn" class="icon-btn" type="button" title="縮放" aria-label="縮放">🔍</button>
                    <button id="micBtn" class="icon-btn" type="button" title="語音聊天" aria-label="語音聊天">🎤</button>
                    <button id="captureBtn" class="icon-btn" type="button" title="儲存整張照片" aria-label="儲存照片">📸</button>
                    <button id="switchCameraBtn" class="icon-btn" type="button" aria-label="切換前後鏡頭">↻</button>
                </div>
                <div id="featureDrawerPanel" class="feature-drawer-panel hidden">
                    <div id="dockModePanel" class="dock-panel hidden">
                        <div class="mode-switcher" role="group" aria-label="選擇模式">
                            <button type="button" class="mode-btn active" data-mode="free" aria-pressed="true">🌿 自由探索</button>
                            <button type="button" class="mode-btn" data-mode="mission" aria-pressed="false">🛡️ 任務模式</button>
                        </div>
                    </div>
                    <div id="dockLangPanel" class="dock-panel hidden">
                        <div class="lang-selector">
                            <label for="langSelect">語言</label>
                            <select id="langSelect">
                                <option value="zh">繁體中文</option>
                                <option value="en">English</option>
                                <option value="ja">日本語</option>
                                <option value="ko">한국어</option>
                            </select>
                        </div>
                    </div>
                    <div id="dockZoomPanel" class="dock-panel hidden">
                        <div id="zoomControl" class="zoom-control hidden">
                            <button class="zoom-btn" data-zoom="1">1x</button>
                            <button class="zoom-btn" data-zoom="2">2x</button>
                            <button class="zoom-btn" data-zoom="5">5x</button>
                            <button class="zoom-btn" data-zoom="10">10x</button>
                            <span id="zoomValue">1.0x</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 任務景點介紹面板（來自 AR-VIEW：任務封面＋說明，取代折頁） -->
            <div id="taskIntroPanel" class="task-intro-panel hidden" aria-label="景點介紹">
                <div class="task-intro-header">
                    <h2 id="taskIntroTitle" class="task-intro-title"></h2>
                    <button id="taskIntroClose" class="icon-btn" type="button" aria-label="關閉">✕</button>
                </div>
                <div class="task-intro-body">
                    <img id="taskIntroCover" class="task-intro-cover" src="" alt="">
                    <div id="taskIntroDescription" class="task-intro-description"></div>
                </div>
            </div>
            <audio id="taskBgm" loop preload="auto" style="display:none;"></audio>

            <div class="top-controls">
                <div id="locationBar" class="location-bar">目前位置：定位中...</div>
            </div>

            <!-- 導演模式開關 -->
            <button id="directorToggle" class="director-toggle hidden">🎬 導演設定</button>


            <!-- 導演控制台 -->
            <div id="directorPanel" class="director-panel hidden">
                <div class="panel-title">導演控制台 (Prompt Engineering)</div>
                
                <div class="input-group">
                    <label>System Prompt (劇本設定)</label>
                    <textarea id="systemPrompt" class="director-input"></textarea>
                </div>

                <div class="input-group">
                    <label>User Prompt (玩家指令)</label>
                    <textarea id="userPrompt" class="director-input" style="min-height: 40px;"></textarea>
                </div>
                
                <div style="font-size:10px; color:#aaa; margin-top:5px;">
                    * 修改後下次辨識生效
                </div>
            </div>
            
            <div id="selectionInstruction" class="selection-instruction">
                <span class="selection-mode-toggle" role="group" aria-label="選擇圈選方式">
                    <button type="button" id="btnReticleMode" class="mode-toggle-btn active" data-mode="reticle">框選（單手）</button>
                    <button type="button" id="btnDrawMode" class="mode-toggle-btn" data-mode="draw">手繪圈選</button>
                </span>
                <p id="instructionText" class="instruction-text">將物體置於框內，點擊下方按鈕拍照</p>
                <button type="button" id="captureReticleBtn" class="capture-reticle-btn">框內拍照</button>
            </div>

            <button id="floatingMicBtn" class="floating-mic-btn" type="button" aria-label="開啟語音提問">🎤</button>

            <!-- 語音聊天面板 -->
            <div id="voicePanel" class="voice-panel hidden">
                <div class="voice-panel-header">
                    <div class="voice-panel-title">語音看圖提問</div>
                    <button id="voiceCloseBtn" class="voice-close-btn" type="button" aria-label="關閉語音面板">✕</button>
                </div>
                <div class="voice-helper-text">送出時會自動擷取目前圈圈中的畫面，並把圖片加上你的提問一起送給 AI。</div>
                <textarea id="voiceDraftInput" class="voice-draft-input" placeholder="先說話轉文字，或直接輸入你想問 AI 的內容"></textarea>
                <div class="voice-action-row">
                    <button id="voiceRecordBtn" class="voice-action-btn secondary" type="button">🎙️ 開始說話</button>
                    <button id="voiceSendBtn" class="voice-action-btn primary" type="button">送出提問</button>
                </div>
                <label class="voice-toggle">
                    <input id="voiceSpeakToggle" type="checkbox" checked>
                    AI 語音回覆
                </label>
                <div class="voice-row">
                    <div class="voice-label">你說</div>
                    <div id="voiceUser" class="voice-text">—</div>
                </div>
                <div class="voice-row">
                    <div class="voice-label">AI</div>
                    <div id="voiceAi" class="voice-text">—</div>
                </div>
                <div id="voiceStatus" class="voice-status">語音待命</div>
            </div>

            <!-- 結果展示區 (隱藏) -->
            <section id="resultPanel" class="result-panel" role="region" aria-label="辨識結果" aria-live="polite">
                <div class="result-content">
                    <!-- 多照片縮圖區 -->
                    <div id="photoStrip" class="photo-strip" aria-label="已拍攝照片">
                        <div class="photo-slot" data-index="0">
                            <div class="slot-placeholder">1</div>
                        </div>
                        <div class="photo-slot" data-index="1">
                            <div class="slot-placeholder">2</div>
                        </div>
                        <div class="photo-slot" data-index="2">
                            <div class="slot-placeholder">3</div>
                        </div>
                    </div>
                    <div id="photoHint" class="photo-hint">請從不同角度拍攝 3 張照片</div>

                    <div id="previewArea" class="preview-area" aria-label="預覽拍攝照片"></div>
                    <div class="analysis-box" aria-label="AI 分析結果">
                        <div id="aiLoading" class="hidden" aria-live="polite">
                            <div class="spinner" aria-hidden="true"></div>
                            <span id="loadingText">正在分析...</span>
                        </div>
                        <div id="aiResult" class="ai-text" aria-live="polite"></div>
                        <div id="rawOutput" class="raw-output" aria-live="polite"></div>
                    </div>
                </div>
                <div class="action-buttons">
                    <button id="retryBtn" class="btn secondary" type="button">重新拍攝</button>
                    <button id="addPhotoBtn" class="btn secondary" type="button">拍攝下一張</button>
                    <button id="analyzeBtn" class="btn primary" type="button" disabled>AI 辨識</button>
                </div>
            </section>

            <div id="queryTransit" class="query-transit hidden" aria-live="polite">
                <div class="query-transit-card">
                    <div class="query-transit-visual" aria-hidden="true">
                        <svg class="query-transit-svg" viewBox="0 0 160 92">
                            <g class="qt-send-bubble">
                                <rect x="14" y="22" width="72" height="42" rx="18" fill="rgba(255,255,255,0.14)" stroke="rgba(255,255,255,0.92)" stroke-width="2"></rect>
                                <path d="M34 64 L28 78 L48 67" fill="rgba(255,255,255,0.14)" stroke="rgba(255,255,255,0.92)" stroke-width="2" stroke-linejoin="round"></path>
                                <line x1="28" y1="36" x2="70" y2="36" stroke="rgba(255,255,255,0.92)" stroke-width="3" stroke-linecap="round"></line>
                                <line x1="28" y1="48" x2="60" y2="48" stroke="rgba(255,255,255,0.72)" stroke-width="3" stroke-linecap="round"></line>
                            </g>
                            <g class="qt-plane-group">
                                <path class="qt-plane-shape" d="M12 44 L108 12 L66 46 L108 80 Z" fill="#ffffff"></path>
                                <path d="M12 44 L108 12 L66 46" fill="none" stroke="#dbeafe" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></path>
                                <path d="M66 46 L108 80" fill="none" stroke="#dbeafe" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></path>
                            </g>
                            <g class="qt-return-bubble">
                                <rect x="76" y="18" width="70" height="44" rx="18" fill="rgba(255,255,255,0.14)" stroke="rgba(255,255,255,0.92)" stroke-width="2"></rect>
                                <path d="M130 62 L138 76 L118 66" fill="rgba(255,255,255,0.14)" stroke="rgba(255,255,255,0.92)" stroke-width="2" stroke-linejoin="round"></path>
                                <line x1="92" y1="34" x2="130" y2="34" stroke="rgba(255,255,255,0.92)" stroke-width="3" stroke-linecap="round"></line>
                                <line x1="92" y1="46" x2="122" y2="46" stroke="rgba(255,255,255,0.72)" stroke-width="3" stroke-linecap="round"></line>
                            </g>
                        </svg>
                    </div>
                    <div class="query-transit-label" id="queryTransitLabel">問題已摺成紙飛機送出...</div>
                </div>
            </div>

            <div id="answerToast" class="answer-toast hidden" aria-live="polite">
                <div class="answer-toast-header">
                    <span class="answer-toast-title">AI 回覆</span>
                    <button id="answerToastClose" class="answer-toast-close" type="button" aria-label="關閉回覆">✕</button>
                </div>
                <div id="answerToastText" class="answer-toast-text"></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>
    <script src="js/ai-lab.js?v=15"></script>
</body>
</html>
